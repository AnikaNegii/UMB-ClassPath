<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassPath — My Routes</title>
<link rel="stylesheet" href="style.css">
<style>
.routes-page-header {
  background: var(--white);
  padding: 24px 24px 20px;
  border-bottom: 1.5px solid var(--border);
}
.routes-page-header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
.routes-page-header p  { font-size: 14px; color: var(--text-muted); margin-top: 4px; }

.empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h3 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.empty-state p  { font-size: 14px; line-height: 1.6; }

.saved-card {
  background: var(--white); border-radius: 16px; border: 1.5px solid var(--border);
  padding: 16px 18px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer; transition: background 0.12s; text-decoration: none; color: var(--text);
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.saved-card:hover { background: var(--bg); }

.sc-icon-wrap {
  width: 46px; height: 46px; background: var(--blue-light);
  border-radius: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.sc-icon-wrap svg { width: 22px; height: 22px; stroke: var(--blue); stroke-width: 2; fill: none; }

.sc-info { flex: 1; }
.sc-code { font-size: 16px; font-weight: 700; }
.sc-sub  { font-size: 13px; color: var(--text-muted); margin-top: 3px; }

.sc-go {
  font-size: 13px; font-weight: 700; color: white;
  background: var(--blue); padding: 7px 16px; border-radius: 20px; white-space: nowrap;
}

.del-btn {
  background: none; border: none; cursor: pointer; color: var(--text-muted);
  padding: 6px; border-radius: 8px; transition: color 0.12s; margin-left: 4px;
}
.del-btn:hover { color: #dc2626; }
.del-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; display: block; }

.add-route-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 15px; border-radius: 14px; border: 2px dashed var(--border);
  background: transparent; font-family: 'DM Sans', sans-serif;
  font-size: 15px; font-weight: 700; color: var(--text-muted);
  cursor: pointer; width: 100%; text-decoration: none; transition: border-color 0.15s, color 0.15s;
}
.add-route-btn:hover { border-color: var(--blue); color: var(--blue); }
.add-route-btn svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; }

.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: white; padding: 10px 22px; border-radius: 20px;
  font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.3s;
  pointer-events: none; white-space: nowrap; z-index: 999;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="phone">
  <nav class="topbar">
    <a href="index.html" class="topbar-brand">
      <div class="topbar-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      </div>
      <div>
        <div class="topbar-name">ClassPath</div>
        <div class="topbar-sub">Find your path to success</div>
      </div>
    </a>
    <button class="topbar-menu" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none"><path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-linecap="round"/></svg>
    </button>
  </nav>

  <div class="screen">
    <div class="routes-page-header">
      <h1>My Routes</h1>
      <p>Your saved destinations</p>
    </div>

    <div id="routesList"></div>

    <div class="content" style="padding-top:10px;">
      <a href="search.html" class="add-route-btn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
        Add a new route
      </a>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="index.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 21V12h6v9" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/></svg>Home</a>
    <a href="search.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor"/><path d="M16.5 16.5 21 21" stroke="currentColor" stroke-linecap="round"/></svg>Search</a>
    <a href="map.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none"><path d="M9 4L3 7v13l6-3 6 3 6-3V4l-6 3-6-3z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/></svg>Map</a>
    <a href="routes.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/></svg>Routes</a>
  </div>
  <div class="toast" id="toast"></div>
</div>
<script>
const DEFAULT_ROUTES = [
  { room:'Q-2-210', building:'Quinn',     floor:'2', type:'lab',     capacity:'20' },
  { room:'W-2-134', building:'Wheatley',  floor:'2', type:'lab',     capacity:'30' },
  { room:'M-1-040', building:'McCormack', floor:'1', type:'lecture', capacity:'120' },
];
const tagClass = t => ({lab:'tag-lab',room:'tag-room',office:'tag-office',lecture:'tag-lecture'}[t]||'tag-room');
const tagLabel = t => ({lab:'Lab',room:'Room',office:'Office',lecture:'Lecture'}[t]||'Room');

function getRoutes() {
  let stored = [];
  try { stored = JSON.parse(localStorage.getItem('savedRoutes') || '[]'); } catch(e) {}
  const all = [...stored];
  DEFAULT_ROUTES.forEach(d => { if (!all.find(s => s.room === d.room)) all.push(d); });
  return all;
}
function saveRoutes(routes) { localStorage.setItem('savedRoutes', JSON.stringify(routes)); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
function deleteRoute(room) {
  saveRoutes(getRoutes().filter(r => r.room !== room));
  render(); showToast('Route removed');
}
function render() {
  const routes = getRoutes();
  const list = document.getElementById('routesList');
  if (routes.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📍</div><h3>No saved routes yet</h3><p>Search for a room and tap "Save this route" to add it here for quick access.</p></div>`;
    return;
  }
  list.innerHTML = `<div class="content" style="padding-bottom:0;">
    <div class="section-label">Saved (${routes.length})</div>
    ${routes.map(r => {
      const navP = new URLSearchParams({ room:r.room, building:r.building, floor:r.floor, mode:'elevator' });
      const detP = new URLSearchParams({ room:r.room, building:r.building, floor:r.floor, type:r.type, capacity:r.capacity });
      return `<div class="saved-card" onclick="window.location='room-details.html?${detP}'">
        <div class="sc-icon-wrap">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="sc-info">
          <div class="sc-code">${r.room}</div>
          <div class="sc-sub">${r.building}, Floor ${r.floor} · <span class="tag ${tagClass(r.type)}" style="padding:2px 8px;font-size:10px;">${tagLabel(r.type)}</span></div>
        </div>
        <a href="navigate.html?${navP}" class="sc-go" onclick="event.stopPropagation()">Go →</a>
        <button class="del-btn" onclick="event.stopPropagation();deleteRoute('${r.room}')">
          <svg viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/></svg>
        </button>
      </div>`;
    }).join('')}
  </div>`;
}
render();
</script>
</body>
</html>
