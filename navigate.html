<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassPath — Navigate</title>
<link rel="stylesheet" href="style.css">
<style>
.nav-direction-header {
  background: linear-gradient(135deg, var(--blue) 0%, #1e40af 100%);
  padding: 16px 24px 24px;
  color: white;
}

.nav-back-label {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; opacity: 0.7; margin-bottom: 12px;
  display: flex; align-items: center; gap: 6px;
}

.nav-back-label svg { width: 14px; height: 14px; stroke: white; stroke-width: 2.5; }

.dir-big { font-size: 30px; font-weight: 800; line-height: 1.2; margin-bottom: 6px; }
.dir-sub-text { font-size: 15px; opacity: 0.8; }

.mini-map-wrap {
  background: var(--white);
  margin: 0 20px;
  border-radius: 16px;
  border: 1.5px solid var(--border);
  overflow: hidden;
  margin-top: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}

.mini-map-wrap svg { width: 100%; height: auto; display: block; }

.step-row {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 13px 0; border-bottom: 1px solid var(--border);
}
.step-row:last-child { border-bottom: none; }

.step-num {
  width: 26px; height: 26px; background: var(--blue); color: white;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
}
.step-num.done    { background: #22c55e; }
.step-num.current { background: var(--blue); box-shadow: 0 0 0 4px var(--blue-light); }

.step-text      { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
.step-text.done { color: var(--text-muted); text-decoration: line-through; }

.nav-controls {
  position: sticky; bottom: var(--nav-h);
  background: var(--white); border-top: 1.5px solid var(--border);
  padding: 12px 20px; display: flex; gap: 12px;
}

.btn-arrived {
  flex: 2; background: var(--blue); color: white;
  border: none; border-radius: 14px; padding: 14px;
  font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: opacity 0.15s;
}
.btn-arrived:hover { opacity: 0.9; }

.btn-stop {
  flex: 1; background: var(--white); color: var(--text);
  border: 1.5px solid var(--border); border-radius: 14px; padding: 14px;
  font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: background 0.15s;
}
.btn-stop:hover { background: var(--bg); }

#arrivedOverlay {
  display: none; position: fixed; inset: 0;
  background: rgba(255,255,255,0.97); z-index: 200;
  align-items: center; justify-content: center;
  flex-direction: column; text-align: center; padding: 40px;
}
#arrivedOverlay.show { display: flex; }
.arrived-icon {
  width: 80px; height: 80px; background: #dcfce7; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px; font-size: 40px;
}
#arrivedOverlay h2 { font-size: 28px; font-weight: 800; color: var(--text); }
#arrivedOverlay p  { font-size: 15px; color: var(--text-muted); margin-top: 8px; }
</style>
</head>
<body>
<div class="phone">
  <nav class="topbar">
    <a href="index.html" class="topbar-brand">
      <div class="topbar-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      </div>
      <div>
        <div class="topbar-name">ClassPath</div>
        <div class="topbar-sub">Find your path to success</div>
      </div>
    </a>
    <button class="topbar-menu" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none"><path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-linecap="round"/></svg>
    </button>
  </nav>
  <div class="topbar-progress"><div class="topbar-progress-fill" id="topProgress" style="width:10%"></div></div>

  <div class="screen">
    <div class="nav-direction-header" id="dirHeader" style="cursor:pointer;" title="Tap to advance">
      <div class="nav-back-label">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke-linecap="round"/></svg>
        NEXT INSTRUCTION
      </div>
      <div class="dir-big" id="dirMain">—</div>
      <div class="dir-sub-text" id="dirSub">—</div>
    </div>

    <div style="padding: 16px 20px 8px;">
      <div class="nav-progress">
        <div class="nav-progress-fill" id="progressFill" style="width:25%;"></div>
      </div>
      <div style="font-size:12px;font-weight:600;color:var(--text-muted);text-align:right;" id="stepCounter">Step 1 of 4</div>
    </div>

    <div class="mini-map-wrap">
      <svg id="miniMapSVG" viewBox="0 0 330 120" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <div style="padding: 16px 20px 0;">
      <div class="section-label">All Steps</div>
      <div id="stepList"></div>
    </div>

    <div class="nav-controls">
      <button class="btn-stop" onclick="stopNav()">Stop Navigation</button>
      <button class="btn-arrived" onclick="arrived()">Arrived</button>
    </div>
    <div style="height:8px;"></div>
  </div>

  <div id="arrivedOverlay">
    <div class="arrived-icon">✓</div>
    <h2 id="arrivedRoom">Arrived!</h2>
    <p id="arrivedSub">You have reached your destination.</p>
    <div style="margin-top:28px;display:flex;flex-direction:column;gap:12px;width:100%;max-width:360px;">
      <a href="index.html" class="btn btn-blue">Back to Home</a>
      <a href="routes.html" class="btn btn-outline">View My Routes</a>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="index.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 21V12h6v9" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/></svg>Home</a>
    <a href="search.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor"/><path d="M16.5 16.5 21 21" stroke="currentColor" stroke-linecap="round"/></svg>Search</a>
    <a href="map.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none"><path d="M9 4L3 7v13l6-3 6 3 6-3V4l-6 3-6-3z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/></svg>Map</a>
    <a href="routes.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/></svg>Routes</a>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
const room = p.get('room') || 'W-2-134';
const building = p.get('building') || 'Wheatley';
const floorNum = p.get('floor') || '2';
const mode = p.get('mode') || 'stairs';

const stairsSteps = [
  { text: 'Enter the main entrance', sub: 'Start from ground floor lobby' },
  { text: `Take stairs on the left`, sub: `Go up to Floor ${floorNum}` },
  { text: `Turn left in 20 ft`, sub: `Toward ${building}` },
  { text: `Room ${room} is on the left`, sub: 'You have arrived!' },
];
const elevSteps = [
  { text: 'Enter the main entrance', sub: 'Start from ground floor lobby' },
  { text: 'Take right to the elevator', sub: 'Accessible elevator near lobby' },
  { text: `Take elevator to Floor ${floorNum}`, sub: 'Press floor button inside' },
  { text: `Room ${room} is on the left`, sub: 'You have arrived!' },
];
const steps = mode === 'elevator' ? elevSteps : stairsSteps;
let currentStep = 0;

function renderStep() {
  const s = steps[currentStep];
  document.getElementById('dirMain').textContent = s.text;
  document.getElementById('dirSub').textContent = s.sub;
  document.getElementById('stepCounter').textContent = `Step ${currentStep+1} of ${steps.length}`;
  const pct = ((currentStep+1)/steps.length)*100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('topProgress').style.width = pct + '%';
  document.getElementById('stepList').innerHTML = steps.map((st, i) => `
    <div class="step-row">
      <div class="step-num ${i < currentStep ? 'done' : i === currentStep ? 'current' : ''}">
        ${i < currentStep ? '✓' : i+1}
      </div>
      <div class="step-text ${i < currentStep ? 'done' : ''}">${st.text}</div>
    </div>`).join('');
}
renderStep();

// Mini map
const rooms = [
  [134,10,20,50,32],[121,70,20,50,32],[140,160,20,50,32],[180,220,20,50,32],
  [122,70,66,50,32],[141,160,66,50,32],[123,70,102,50,32],[142,160,102,50,32],
];
const targetId = parseInt(room.split('-').pop()) || 134;
const targetRoom = rooms.find(r => r[0] === targetId) || rooms[0];
const tx = targetRoom[1]+targetRoom[3]/2, ty = targetRoom[2]+targetRoom[4]/2;
const startX = 280, startY = 108;
document.getElementById('miniMapSVG').innerHTML = `
  <rect x="0" y="0" width="330" height="120" fill="#f1f5f9" rx="4"/>
  <rect x="0" y="56" width="330" height="8" fill="#e2e8f0"/>
  <rect x="120" y="0" width="8" height="120" fill="#e2e8f0"/>
  ${rooms.map(([id,x,y,w,h])=>`
    <rect x="${x}" y="${y}" width="${w}" height="${h}"
      fill="${id===targetId?'#bfdbfe':'#fff'}"
      stroke="${id===targetId?'#2563eb':'#cbd5e1'}"
      stroke-width="${id===targetId?2:1}" rx="2"/>
    <text x="${x+w/2}" y="${y+h/2+4}" text-anchor="middle"
      font-family="DM Sans,sans-serif" font-size="9"
      font-weight="${id===targetId?'700':'500'}"
      fill="${id===targetId?'#1d4ed8':'#94a3b8'}">${id}</text>`).join('')}
  <path d="M${startX},${startY} L${startX},${ty} L${tx},${ty}"
    fill="none" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="6,3" stroke-linecap="round"/>
  <circle cx="${startX}" cy="${startY}" r="5" fill="#22c55e" stroke="white" stroke-width="1.5"/>
  <circle cx="${tx}" cy="${ty}" r="6" fill="#2563eb" stroke="white" stroke-width="2"/>`;

document.getElementById('dirHeader').addEventListener('click', () => {
  if (currentStep < steps.length - 1) { currentStep++; renderStep(); }
});

function stopNav() {
  if (confirm('Stop navigation?')) window.location.href = 'index.html';
}
function arrived() {
  document.getElementById('arrivedRoom').textContent = `Arrived at ${room}!`;
  document.getElementById('arrivedSub').textContent = `${building}, Floor ${floorNum}`;
  document.getElementById('arrivedOverlay').classList.add('show');
}
</script>
</body>
</html>
